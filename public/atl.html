<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelTrak - Authority to Load</title>
    <script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/mobile.css">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body class="bg-gray-100 min-h-screen pb-16 sm:pb-0">
    <nav class="bg-blue-900 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <span class="font-bold text-sm sm:text-lg md:text-xl">ðŸ“‹ Authority to Load</span>
            <div class="flex items-center space-x-3">
                <a href="/dashboard" class="bg-blue-700 px-2 sm:px-3 py-1 rounded text-[10px] sm:text-sm">Dashboard</a>
                <a href="/trucks" class="bg-blue-700 px-3 py-1 rounded text-sm">Trucks</a>
                <button onclick="logout()" class="bg-red-500 px-2 sm:px-4 py-1 sm:py-2 rounded text-[10px] sm:text-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-8 gap-8">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-xl font-bold mb-4">Submit ATL</h2>
                <form onsubmit="submitATL(event)" class="space-y-3">
                    <input type="text" id="company" placeholder="Company" class="w-full px-3 py-2 border rounded" required>
                    <input type="text" id="so" placeholder="SO Number" class="w-full px-3 py-2 border rounded" required>
                    <input type="date" id="date" class="w-full px-3 py-2 border rounded" required>
                    <input type="text" id="hauler" placeholder="Hauler" class="w-full px-3 py-2 border rounded" required>
                    <input type="text" id="plate" placeholder="Plate Number" class="w-full px-3 py-2 border rounded uppercase" required>
                    <input type="text" id="driver" placeholder="Driver Name" class="w-full px-3 py-2 border rounded" required>
                    <input type="text" id="contact" placeholder="Contact Number" class="w-full px-3 py-2 border rounded" required>
                    <button type="submit" class="w-full bg-blue-900 text-white py-2 rounded font-semibold">Submit ATL</button>
                </form>
                <div id="msg" class="mt-3 text-sm hidden"></div>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-xl font-bold mb-4">My ATL History</h2>
                <div id="atlHistory"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('fueltrak_token');
        if (!token) window.location.href = '/';

        async function submitATL(e) {
            e.preventDefault();
            const msg = document.getElementById('msg');
            const res = await fetch('/api/atl/submit', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    company: document.getElementById('company').value,
                    so_number: document.getElementById('so').value,
                    scheduled_date: document.getElementById('date').value,
                    hauler: document.getElementById('hauler').value,
                    plate_no: document.getElementById('plate').value,
                    driver_name: document.getElementById('driver').value,
                    contact_number: document.getElementById('contact').value
                })
            });
            const data = await res.json();
            msg.textContent = data.status === 'success' ? 'âœ… ATL Submitted!' : data.error;
            msg.className = 'mt-3 text-sm ' + (data.status === 'success' ? 'text-green-600' : 'text-red-600');
            msg.classList.remove('hidden');
            if (data.status === 'success') loadHistory();
        }

        async function loadHistory() {
            const res = await fetch('/api/atl/summary', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            if (data.status === 'success') {
                document.getElementById('atlHistory').innerHTML = data.data.recent.map(a => `
                    <div class="border rounded p-3 mb-2">
                        <p class="font-semibold">${a.truck?.plate_no||a.plate_no} - ${a.status}</p>
                        <p class="text-xs text-gray-500">${a.company||''} | ${a.scheduled_date}</p>
                    </div>
                `).join('') || '<p class="text-gray-500">No ATLs yet</p>';
            }
        }

        function logout() { localStorage.clear(); window.location.href = '/'; }
        loadHistory();
    </script>
</body>
</html>
