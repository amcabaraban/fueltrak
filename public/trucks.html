<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuelTrak - Truck Masterlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    .table-wrap{overflow-x:auto}@media print{nav,.no-print{display:none!important}}
    #sidebar{transition:transform 0.3s}@media(max-width:767px){#sidebar{transform:translateX(-100%)}#sidebar.open{transform:translateX(0)}body.sidebar-open{overflow:hidden}}@media(min-width:768px){body{padding-left:176px}}
  </style>
</head>
<body class="bg-gray-50 min-h-screen"><div class="main-content">
  <nav class="bg-gradient-to-r from-blue-900 to-blue-800 text-white shadow-xl sticky top-0 z-20 no-print">
    <div class="hidden md:flex max-w-7xl mx-auto px-4 py-3 justify-between items-center">
      <div class="flex items-center space-x-3"><div class="bg-white/20 p-2 rounded-lg"><i class="fas fa-truck text-2xl text-yellow-400"></i></div><div><span class="font-bold text-xl">Truck Masterlist</span></div></div>
      <div class="flex items-center space-x-3"><span id="userInfo" class="text-sm bg-white/10 px-3 py-1 rounded-full"></span><div class="flex-1 overflow-y-auto"></div>
    </div>
    <div class="flex md:hidden px-2 py-2 items-center space-x-1">
      <div class="flex items-center space-x-1 flex-shrink-0"><div class="bg-white/20 p-1 rounded"><i class="fas fa-truck text-sm text-yellow-400"></i></div><span class="font-bold text-xs whitespace-nowrap">Trucks</span></div>
      <div class="flex-1 overflow-x-auto flex items-center space-x-1" style="scrollbar-width:none">
        <span id="userInfoMob" class="text-[9px] bg-white/10 px-1.5 py-0.5 rounded-full flex-shrink-0 max-w-[80px] truncate"></span>
        <div class="flex items-center space-x-3"><span id="userInfo" class="text-sm bg-white/10 px-3 py-1 rounded-full"></span><div class="flex-1 overflow-y-auto">
        
      </div>
    </div>
  </nav>

  <!-- Sidebar Navigation -->
  <div class="fixed left-0 top-0 h-full w-14 md:w-48 bg-blue-900 text-white z-40 pt-16 overflow-y-auto no-print" id="sidebar"  class="flex flex-col">
    <a href="/dashboard" class="flex items-center px-2 md:px-4 py-5 hover:bg-blue-800 text-xs md:text-sm whitespace-nowrap" title="Dashboard">
      <i class="fas fa-tachometer-alt w-6 text-center"></i><span class="hidden md:inline ml-2">Dashboard</span>
    </a>
    <a href="/reports" class="flex items-center px-2 md:px-4 py-5 hover:bg-blue-800 text-xs md:text-sm whitespace-nowrap" title="Reports">
      <i class="fas fa-chart-bar w-6 text-center"></i><span class="hidden md:inline ml-2">Reports</span>
    </a>
    <a href="/trucks" class="flex items-center px-2 md:px-4 py-5 hover:bg-blue-800 text-xs md:text-sm whitespace-nowrap" title="Truck Masterlist">
      <i class="fas fa-truck w-6 text-center"></i><span class="hidden md:inline ml-2">Truck Masterlist</span>
    </a>
    <a href="/docs-report" class="flex items-center px-2 md:px-4 py-5 hover:bg-blue-800 text-xs md:text-sm whitespace-nowrap" title="Doc Report">
      <i class="fas fa-file-alt w-6 text-center"></i><span class="hidden md:inline ml-2">Doc Report</span>
    </a>
    <a href="/ttsd-checklist" class="flex items-center px-2 md:px-4 py-5 hover:bg-blue-800 text-xs md:text-sm whitespace-nowrap" title="TTSD Checklist">
      <i class="fas fa-clipboard-check w-6 text-center"></i><span class="hidden md:inline ml-2">TTSD Checklist</span>
    </a>
    <a href="/audit-logs" class="flex items-center px-2 md:px-4 py-5 hover:bg-blue-800 text-xs md:text-sm whitespace-nowrap" title="Audit Logs">
      <i class="fas fa-history w-6 text-center"></i><span class="hidden md:inline ml-2">Audit Logs</span>
    </a></div><div class="border-t border-blue-700 p-2" >
      <button onclick="logout()" class="flex items-center px-2 py-3 hover:bg-red-700 text-xs md:text-sm w-full text-left whitespace-nowrap">
        <i class="fas fa-sign-out-alt w-6 text-center"></i><span class="hidden md:inline ml-2">Logout</span>
      </button>
    </div>
  </div>

  <!-- Overlay for mobile sidebar -->
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 md:hidden" onclick="toggleSidebar()"></div>

  <!-- Mobile hamburger -->
  <button onclick="toggleSidebar()" class="fixed top-2 left-2 z-50 md:hidden bg-blue-900 text-white p-2 rounded">
    <i class="fas fa-bars"></i>
  </button>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex flex-wrap justify-between items-center mb-6 gap-2">
      <h1 class="text-3xl font-bold">Truck Masterlist</h1>
      <div class="flex gap-2">
        <input type="text" id="searchInput" placeholder="Search plate, driver, hauler..." class="px-3 py-2 border rounded text-sm w-64" oninput="currentPage=1;loadTrucks()">
        <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm no-print"><i class="fas fa-print mr-1"></i>Print</button>
      </div>
    </div>
    <p class="text-sm text-gray-500 mb-2" id="recordCount"></p>
    <div class="bg-white rounded-xl shadow-lg overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 border-b"><tr><th class="py-3 px-3 text-left">Make</th><th class="py-3 px-3 text-left">Plate No</th><th class="py-3 px-3 text-left">Driver</th><th class="py-3 px-3 text-left">Hauler/Customer</th><th class="py-3 px-3 text-center">COTs</th><th class="py-3 px-3 text-right">Capacity (KL)</th><th class="py-3 px-3 text-center">TPS Count</th></tr></thead><tbody id="truckBody"><tr><td colspan="7" class="text-center py-8 text-gray-500">Loading...</td></tr></tbody></table></div></div>
    <div class="px-4 py-3 border-t flex justify-between items-center bg-white rounded-b-xl">
      <div class="text-sm text-gray-500" id="pageInfo"></div>
      <div class="flex items-center space-x-2" id="pagination"></div>
    </div>
  </div>

  <script>
    const token=localStorage.getItem('fueltrak_token');const user=JSON.parse(localStorage.getItem('fueltrak_user')||'{}');
    if(!token)window.location.replace('/');
    document.getElementById('userInfo').textContent=user.email+' ('+user.role+')';
    document.getElementById('userInfoMob').textContent=user.email+' ('+user.role+')';
    
    var allTrucks=[],currentPage=1,perPage=20;
    
    async function loadTrucks(){
      var res=await fetch('/api/truck-masterlist-all',{headers:{'Authorization':'Bearer '+token}});
      var data=await res.json();
      if(data.status==='success'){
        var search=document.getElementById('searchInput').value.toLowerCase();
        allTrucks=data.data;
        if(search) allTrucks=allTrucks.filter(function(t){return(t.plate_no||'').toLowerCase().indexOf(search)>=0||(t.driver_name||'').toLowerCase().indexOf(search)>=0||(t.hauler_name||'').toLowerCase().indexOf(search)>=0;});
        renderPage();
      }
    }
    
    function renderPage(){
      var totalPages=Math.ceil(allTrucks.length/perPage);
      if(currentPage>totalPages)currentPage=totalPages||1;
      var start=(currentPage-1)*perPage;
      var pageData=allTrucks.slice(start,start+perPage);
      
      document.getElementById('recordCount').textContent='Total: '+allTrucks.length+' trucks';
      document.getElementById('pageInfo').textContent='Showing '+(start+1)+'-'+Math.min(start+perPage,allTrucks.length)+' of '+allTrucks.length;
      
      document.getElementById('truckBody').innerHTML=pageData.map(function(t){
        var cots=[t.cot1,t.cot2,t.cot3,t.cot4,t.cot5,t.cot6,t.cot7,t.cot8,t.cot9,t.cot10].filter(function(v){return parseFloat(v)>0;});
        var totalCap=cots.reduce(function(s,v){return s+parseFloat(v);},0);
        var capKL=totalCap>0?Math.round(totalCap/1000):0;
        return'<tr class="border-b hover:bg-gray-50">'+
          '<td class="py-2 px-3 cursor-pointer hover:bg-yellow-50" onclick="editTruck('+t.id+',\'truck_make\',this)">'+(t.truck_make||'-')+'</td>'+
          '<td class="py-2 px-3 font-semibold">'+t.plate_no+'</td>'+
          '<td class="py-2 px-3 cursor-pointer hover:bg-yellow-50" onclick="editTruck('+t.id+',\'driver_name\',this)">'+(t.driver_name||'-').replace(/"/g,'')+'</td>'+
          '<td class="py-2 px-3 cursor-pointer hover:bg-yellow-50" onclick="editTruck('+t.id+',\'hauler_name\',this)">'+(t.hauler_name||'-')+'</td>'+
          '<td class="py-2 px-3 text-center">'+cots.length+'</td>'+
          '<td class="py-2 px-3 text-right font-bold">'+capKL.toLocaleString()+' KL</td>'+
          '<td class="py-2 px-3 text-center cursor-pointer hover:bg-yellow-50" onclick="editTruck('+t.id+',\'tps_count\',this)">'+(t.tps_count||0)+'</td>'+
          '</tr>';
      }).join('')||'<tr><td colspan="7" class="text-center py-8 text-gray-500">No trucks found</td></tr>';

      // Pagination
      var pagHTML='';
      pagHTML+='<button onclick="changePage('+(currentPage-1)+')" class="px-2 py-1 border rounded text-xs '+(currentPage===1?'text-gray-300 cursor-not-allowed':'hover:bg-gray-100')+'" '+(currentPage===1?'disabled':'')+'><i class="fas fa-chevron-left"></i></button>';
      for(var i=1;i<=totalPages;i++){
        if(i===1||i===totalPages||(i>=currentPage-2&&i<=currentPage+2)){
          pagHTML+='<button onclick="changePage('+i+')" class="px-2 py-1 border rounded text-xs '+(i===currentPage?'bg-blue-900 text-white':'hover:bg-gray-100')+'">'+i+'</button>';
        }else if(i===currentPage-3||i===currentPage+3){
          pagHTML+='<span class="px-1 text-xs">...</span>';
        }
      }
      pagHTML+='<button onclick="changePage('+(currentPage+1)+')" class="px-2 py-1 border rounded text-xs '+(currentPage===totalPages?'text-gray-300 cursor-not-allowed':'hover:bg-gray-100')+'" '+(currentPage===totalPages?'disabled':'')+'><i class="fas fa-chevron-right"></i></button>';
      document.getElementById('pagination').innerHTML=pagHTML;
    }
    
    function changePage(page){
      var totalPages=Math.ceil(allTrucks.length/perPage);
      if(page<1||page>totalPages)return;
      currentPage=page;
      renderPage();
    }
    
    async function editTruck(id, field, cell){
      var current=cell.textContent.trim();
      if(field==='tps_count') current=parseInt(current)||0;
      var newVal=prompt('Edit '+field.replace(/_/g,' ')+':', current);
      if(newVal===null) return;
      
      var body={};
      body[field]=field==='tps_count'?parseInt(newVal):newVal;
      
      var res=await fetch('/api/update-truck-masterlist/'+id,{
        method:'PUT',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify(body)
      });
      var data=await res.json();
      if(data.status==='success'){
        cell.textContent=field==='tps_count'?parseInt(newVal):newVal;
        cell.classList.add('bg-green-100');
        setTimeout(function(){cell.classList.remove('bg-green-100');},1000);
      }else{
        alert(data.error||'Error updating');
      }
    }
    function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");document.getElementById("sidebarOverlay").classList.toggle("hidden");document.body.classList.toggle("sidebar-open");}

    function logout(){localStorage.clear();window.location.href='/';}
    loadTrucks();
  </script>
  </div></body>
</html>
