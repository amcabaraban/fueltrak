<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelTrak - Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
        @media print {
            body { background: white !important; }
            nav, .no-print, #sidebar, #sidebarOverlay { display: none !important; }
            #printArea { display: block !important; padding: 20px; }
            #printArea table { width: 100%; border-collapse: collapse; font-size: 11px; }
            #printArea th, #printArea td { border: 1px solid #ddd; padding: 4px 6px; text-align: left; }
            #printArea th { background: #f0f0f0 !important; }
        }
        .print-only { display: none; }
        @media print { .print-only { display: block; } body { padding-left: 0 !important; } }
        th { cursor: pointer; user-select: none; white-space: nowrap; }
        th.sort-asc::after { content: ' ▲'; font-size: 10px; }
        th.sort-desc::after { content: ' ▼'; font-size: 10px; }
        #sidebar{transition:transform 0.3s}
        @media(max-width:767px){#sidebar{transform:translateX(-100%)}#sidebar.open{transform:translateX(0)}body.sidebar-open{overflow:hidden}}
        @media(min-width:768px){body{padding-left:176px}}
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="main-content">
    <nav class="bg-gradient-to-r from-blue-900 to-blue-800 text-white shadow-xl sticky top-0 z-20 no-print">
        <div class="hidden md:flex max-w-7xl mx-auto px-4 py-3 justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-white/20 p-2 rounded-lg"><i class="fas fa-chart-bar text-2xl text-yellow-400"></i></div>
                <div><span class="font-bold text-xl">FuelTrak Reports</span></div>
            </div>
            <div class="flex items-center space-x-3">
                <span id="userInfo" class="text-sm bg-white/10 px-3 py-1 rounded-full"></span>
                <a href="/dashboard" class="bg-white/20 px-3 py-1 rounded text-sm hover:bg-white/30"><i class="fas fa-chart-pie mr-1"></i>Dashboard</a>
                <button onclick="logout()" class="bg-red-500/80 hover:bg-red-500 px-4 py-2 rounded text-sm"><i class="fas fa-sign-out-alt mr-1"></i>Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-2 sm:px-4 py-8">
        <h1 class="text-2xl font-bold mb-4">Reports & Analytics</h1>

        <!-- Filters -->
        <div class="bg-white rounded-xl shadow-lg p-4 mb-4 no-print">
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                <div><label class="text-xs font-semibold">Start Date</label><input type="date" id="startDate" class="w-full px-2 py-1.5 border rounded text-sm" onchange="loadReports()"></div>
                <div><label class="text-xs font-semibold">End Date</label><input type="date" id="endDate" class="w-full px-2 py-1.5 border rounded text-sm" onchange="loadReports()"></div>
                <div><label class="text-xs font-semibold">Status</label><select id="statusFilter" class="w-full px-2 py-1.5 border rounded text-sm" onchange="loadReports()">
                    <option value="completed,cancelled,dispatched">All</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                    <option value="dispatched">Ongoing</option>
                </select></div>
                <div><label class="text-xs font-semibold">Client</label><select id="clientFilter" class="w-full px-2 py-1.5 border rounded text-sm" onchange="loadReports()"><option value="">All</option></select></div>
                <div><label class="text-xs font-semibold">Truck</label><select id="truckFilter" class="w-full px-2 py-1.5 border rounded text-sm" onchange="loadReports()"><option value="">All</option></select></div>
                <div class="flex items-end gap-2">
                    <button onclick="clearFilters()" class="text-blue-600 text-xs">Clear</button>
                    <button onclick="printReport()" class="bg-blue-600 text-white px-3 py-1.5 rounded text-xs">Print</button>
                    <button onclick="exportCSV()" class="bg-green-600 text-white px-3 py-1.5 rounded text-xs">Export</button>
                </div>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-4" id="summaryCards"></div>

        <!-- Records Table -->
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <div class="table-wrap">
                <table class="w-full text-xs">
                    <thead class="bg-gray-50 border-b sticky top-0">
                        <tr>
                            <th class="py-2 px-2 text-left" onclick="sortTable('reportTableBody',0)">Date</th>
                            <th class="py-2 px-2 text-left" onclick="sortTable('reportTableBody',1)">ATL Code</th>
                            <th class="py-2 px-2 text-left" onclick="sortTable('reportTableBody',2)">Plate</th>
                            <th class="py-2 px-2 text-left" onclick="sortTable('reportTableBody',3)">Driver</th>
                            <th class="py-2 px-2 text-right" onclick="sortTable('reportTableBody',4)">Volume</th>
                            <th class="py-2 px-2 text-center" onclick="sortTable('reportTableBody',5)">SI</th>
                            <th class="py-2 px-2 text-center" onclick="sortTable('reportTableBody',6)">Status</th>
                            <th class="py-2 px-2 text-center" onclick="sortTable('reportTableBody',7)">WC</th>
                            <th class="py-2 px-2 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody">
                        <tr><td colspan="9" class="text-center py-8 text-gray-500">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="px-4 py-2 border-t flex justify-between items-center text-xs">
                <span id="reportCount"></span>
                <span id="pagination"></span>
            </div>
        </div>
    </div>

    <div id="detailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg max-h-[80vh] overflow-y-auto p-6">
            <div class="flex justify-between mb-4"><h3 class="text-lg font-bold">ATL Details</h3><button onclick="document.getElementById('detailModal').classList.add('hidden')" class="text-2xl">&times;</button></div>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>
        const API = '/api';
        const token = localStorage.getItem('fueltrak_token');
        const user = JSON.parse(localStorage.getItem('fueltrak_user') || '{}');
        if (!token || !['dispatcher','management'].includes(user.role)) window.location.replace('/');
        document.getElementById('userInfo').textContent = user.email.split('@')[0].substring(0,3)+'***@'+user.email.split('@')[1] + ' (' + user.role + ')';

        async function api(url, method = 'GET') {
            const res = await fetch(API + url, { method, headers: { 'Authorization': 'Bearer ' + token } });
            return await res.json();
        }

        async function loadFilters() {
            const data = await api('/reports/filters');
            if (data.status === 'success') {
                document.getElementById('clientFilter').innerHTML = '<option value="">All Clients</option>' + data.data.clients.map(c => `<option value="${c.id}">${c.label}</option>`).join('');
                document.getElementById('truckFilter').innerHTML = '<option value="">All Trucks</option>' + data.data.trucks.map(t => `<option value="${t.id}">${t.label}</option>`).join('');
            }
            document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('endDate').value = new Date().toISOString().split('T')[0];
        }

        var currentPage = 1, recordsPerPage = 15, allRecords = [];

        function paginateData() {
            var totalPages = Math.ceil(allRecords.length / recordsPerPage);
            if (currentPage > totalPages) currentPage = totalPages || 1;
            var start = (currentPage - 1) * recordsPerPage;
            var pageData = allRecords.slice(start, start + recordsPerPage);
            renderTableRows(pageData);
            
            var pagHTML = '';
            pagHTML += '<button onclick="changePage('+(currentPage-1)+')" class="px-2 py-1 border rounded '+(currentPage===1?'text-gray-300':'hover:bg-gray-100')+'" '+(currentPage===1?'disabled':'')+'><i class="fas fa-chevron-left"></i></button>';
            for (var i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2))
                    pagHTML += '<button onclick="changePage('+i+')" class="px-2 py-1 border rounded '+(i===currentPage?'bg-blue-900 text-white':'hover:bg-gray-100')+'">'+i+'</button>';
                else if (i === currentPage - 3 || i === currentPage + 3)
                    pagHTML += '<span class="px-1">...</span>';
            }
            pagHTML += '<button onclick="changePage('+(currentPage+1)+')" class="px-2 py-1 border rounded '+(currentPage===totalPages?'text-gray-300':'hover:bg-gray-100')+'" '+(currentPage===totalPages?'disabled':'')+'><i class="fas fa-chevron-right"></i></button>';
            document.getElementById('pagination').innerHTML = pagHTML;
        }

        function changePage(page) {
            if (page < 1 || page > Math.ceil(allRecords.length / recordsPerPage)) return;
            currentPage = page; paginateData();
        }

        function renderTableRows(records) {
            document.getElementById('reportTableBody').innerHTML = records.map(r => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="py-1.5 px-2">${r.completed_date ? new Date(r.completed_date).toLocaleDateString() : r.dispatch_date ? new Date(r.dispatch_date).toLocaleDateString() : '-'}</td>
                    <td class="py-1.5 px-2 font-mono font-bold text-blue-900">${r.atl_code||'-'}</td>
                    <td class="py-1.5 px-2 font-semibold">${r.plate_no}</td>
                    <td class="py-1.5 px-2">${r.driver_name||'-'}</td>
                    <td class="py-1.5 px-2 text-right">${r.volume ? Math.round(r.volume).toLocaleString() : '0'}</td>
                    <td class="py-1.5 px-2 text-center cursor-pointer hover:bg-blue-50" onclick="toggleSI(${r.id},this)">${r.has_si==1?'With SI':'No SI'}</td>
                    <td class="py-1.5 px-2 text-center"><span class="px-1.5 py-0.5 rounded text-xs ${r.status==='completed'?'bg-green-100 text-green-800':r.status==='cancelled'?'bg-red-100 text-red-800':'bg-orange-100 text-orange-800'}">${r.status}</span></td>
                    <td class="py-1.5 px-2 text-center cursor-pointer hover:bg-yellow-50" onclick="editWC(${r.id},this)">${r.printed_wc||'-'}</td>
                    <td class="py-1.5 px-2 text-center">
                        <button onclick="viewDetails(${r.id})" class="text-blue-600 text-xs mr-1"><i class="fas fa-eye"></i></button>
                        <button onclick="openBackload(${r.id})" class="text-orange-600 text-xs"><i class="fas fa-undo"></i></button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="9" class="text-center py-8 text-gray-500">No records found</td></tr>';
            document.getElementById('reportCount').textContent = 'Showing ' + records.length + ' of ' + allRecords.length;
        }

        async function loadReports() {
            if (!document.getElementById('startDate').value) document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
            if (!document.getElementById('endDate').value) document.getElementById('endDate').value = new Date().toISOString().split('T')[0];
            
            const params = new URLSearchParams();
            ['startDate','endDate'].forEach(id => { const v = document.getElementById(id).value; if (v) params.append(id, v); });
            const status = document.getElementById('statusFilter').value; if (status) params.append('status', status);
            const client = document.getElementById('clientFilter').value; if (client) params.append('clientId', client);
            const truck = document.getElementById('truckFilter').value; if (truck) params.append('truckId', truck);

            const data = await api('/reports/summary?' + params.toString());
            if (data.status === 'success') {
                const d = data.data;
                document.getElementById('summaryCards').innerHTML = `
                    <div class="bg-white rounded-xl shadow p-3 text-center"><p class="text-xl font-bold">${d.summary.total_records||0}</p><p class="text-xs text-gray-500">Records</p></div>
                    <div class="bg-green-50 rounded-xl shadow p-3 text-center"><p class="text-xl font-bold text-green-700">${d.summary.completed||0}</p><p class="text-xs text-gray-500">Completed</p></div>
                    <div class="bg-red-50 rounded-xl shadow p-3 text-center"><p class="text-xl font-bold text-red-700">${d.summary.cancelled||0}</p><p class="text-xs text-gray-500">Cancelled</p></div>
                    <div class="bg-orange-50 rounded-xl shadow p-3 text-center"><p class="text-xl font-bold text-orange-700">${((d.summary.total_volume||0)/1000).toFixed(1)}kL</p><p class="text-xs text-gray-500">Total Volume</p></div>
                    <div class="bg-blue-50 rounded-xl shadow p-3 text-center"><p class="text-xl font-bold text-blue-700">${((d.summary.total_actual_volume||0)/1000).toFixed(1)}kL</p><p class="text-xs text-gray-500">Actual</p></div>
                `;
                allRecords = d.records || [];
                currentPage = 1;
                paginateData();
            }
        }

        async function viewDetails(id) {
            const res = await fetch(API + '/reports/summary?status=completed,cancelled,dispatched,pending,approved,rejected', { headers: { 'Authorization': 'Bearer ' + token } });
            const data = await res.json();
            if (data.status === 'success') {
                const a = data.data.records.find(r => r.id === id);
                if (a) {
                    document.getElementById('detailContent').innerHTML = `
                        <div class="text-center mb-3"><p class="text-xl font-mono font-bold text-blue-900">${a.atl_code||'N/A'}</p></div>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <div><p class="text-xs text-gray-500">Company</p><p class="font-semibold">${a.company||'-'}</p></div>
                            <div><p class="text-xs text-gray-500">SO Number</p><p>${a.so_number||'-'}</p></div>
                            <div><p class="text-xs text-gray-500">Plate</p><p class="font-semibold">${a.plate_no}</p></div>
                            <div><p class="text-xs text-gray-500">Driver</p><p>${a.driver_name||'-'}</p></div>
                            <div><p class="text-xs text-gray-500">Volume</p><p>${a.volume?Number(a.volume).toLocaleString()+' L':'-'}</p></div>
                            <div><p class="text-xs text-gray-500">Actual</p><p>${a.actual_volume?Number(a.actual_volume).toLocaleString()+' L':'-'}</p></div>
                            <div><p class="text-xs text-gray-500">Status</p><span class="px-2 py-0.5 rounded text-xs ${a.status==='completed'?'bg-green-100 text-green-800':'bg-orange-100 text-orange-800'}">${a.status}</span></div>
                            <div><p class="text-xs text-gray-500">SI</p><p>${a.has_si==1?'With SI':'No SI'}</p></div>
                            <div><p class="text-xs text-gray-500">WC</p><p>${a.printed_wc||'-'}</p></div>
                            <div><p class="text-xs text-gray-500">Scheduled</p><p>${a.scheduled_date||'-'}</p></div>
                            <div><p class="text-xs text-gray-500">Completed</p><p>${a.completed_date?new Date(a.completed_date).toLocaleString():'-'}</p></div>
                            <div><p class="text-xs text-gray-500">Remarks</p><p>${a.remarks||'None'}</p></div>
                        </div>`;
                    document.getElementById('detailModal').classList.remove('hidden');
                }
            }
        }

        function clearFilters() {
            ['startDate','endDate','clientFilter','truckFilter'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('endDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('statusFilter').value = 'completed,cancelled,dispatched';
            loadReports();
        }

        function printReport() { window.print(); }

        async function exportCSV() {
            const params = new URLSearchParams();
            ['startDate','endDate'].forEach(id => { const v = document.getElementById(id).value; if (v) params.append(id, v); });
            const status = document.getElementById('statusFilter').value; if (status) params.append('status', status);
            const res = await fetch(API + '/reports/export?' + params.toString(), { headers: { 'Authorization': 'Bearer ' + token } });
            if (!res.ok) return alert('Export failed');
            const blob = await res.blob();
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `report-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        async function editWC(id, cell) {
            const wc = prompt('Printed WC:', cell.textContent.trim() === '-' ? '' : cell.textContent.trim());
            if (wc === null) return;
            const wcClean = wc.replace(/\D/g,'').substring(0,12);
            const res = await fetch('/api/dispatch/update-wc/'+id, { method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body:JSON.stringify({printed_wc:wcClean||null}) });
            const data = await res.json();
            if (data.status==='success') { cell.textContent = wcClean||'-'; cell.classList.add('bg-green-100'); setTimeout(()=>cell.classList.remove('bg-green-100'),1000); }
        }

        async function toggleSI(id, cell) {
            const news = cell.textContent.trim() !== 'With SI';
            const res = await fetch('/api/dispatch/update-si/'+id, { method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body:JSON.stringify({has_si:news?1:0}) });
            if ((await res.json()).status==='success') { cell.textContent = news?'With SI':'No SI'; cell.classList.add('bg-green-100'); setTimeout(()=>cell.classList.remove('bg-green-100'),1000); }
        }

        function logout() { localStorage.clear(); window.location.href = '/'; }

        loadFilters();
        loadReports();
    </script>
</div>
</body>
</html>
