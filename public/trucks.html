<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelTrak - Truck Masterlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>.table-wrap{overflow-x:auto}@media print{nav,.no-print{display:none!important}}</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-gradient-to-r from-blue-900 to-blue-800 text-white shadow-xl sticky top-0 z-50 no-print">
        <div class="hidden md:flex max-w-7xl mx-auto px-4 py-3 justify-between items-center">
            <div class="flex items-center space-x-3"><div class="bg-white/20 p-2 rounded-lg"><i class="fas fa-truck text-2xl text-yellow-400"></i></div><div><span class="font-bold text-xl">Truck Masterlist</span></div></div>
            <div class="flex items-center space-x-3"><span id="userInfo" class="text-sm bg-white/10 px-3 py-1 rounded-full"></span><a href="/dashboard" class="bg-white/20 px-3 py-1 rounded text-sm hover:bg-white/30">Dashboard</a><button onclick="logout()" class="bg-red-500/80 hover:bg-red-500 px-4 py-2 rounded text-sm">Logout</button></div>
        </div>
        <div class="flex md:hidden px-2 py-2 items-center space-x-1">
            <div class="flex items-center space-x-1 flex-shrink-0"><div class="bg-white/20 p-1 rounded"><i class="fas fa-truck text-sm text-yellow-400"></i></div><span class="font-bold text-xs whitespace-nowrap">Trucks</span></div>
            <div class="flex-1 overflow-x-auto flex items-center space-x-1" style="-webkit-overflow-scrolling:touch;scrollbar-width:none">
                <span id="userInfoMob" class="text-[9px] bg-white/10 px-1.5 py-0.5 rounded-full flex-shrink-0 max-w-[80px] truncate"></span>
                <a href="/dashboard" class="bg-white/20 px-1.5 py-0.5 rounded text-[9px] hover:bg-white/30 flex-shrink-0 whitespace-nowrap"><i class="fas fa-chart-pie text-[10px] mr-0.5"></i>Dashboard</a>
                <button onclick="logout()" class="bg-red-500/80 hover:bg-red-500 px-1.5 py-0.5 rounded text-[9px] flex-shrink-0 whitespace-nowrap"><i class="fas fa-sign-out-alt text-[10px]"></i>Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">Truck Masterlist</h1><div class="flex gap-2"><input type="text" id="searchInput" placeholder="Search plate, driver..." class="px-3 py-2 border rounded text-sm" oninput="loadTrucks()"><button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm no-print"><i class="fas fa-print mr-1"></i>Print</button></div></div>
        <div class="bg-white rounded-xl shadow-lg overflow-hidden"><div class="table-wrap"><table class="w-full text-sm"><thead class="bg-gray-50 border-b"><tr><th class="py-3 px-3 text-left">Make</th><th class="py-3 px-3 text-left">Plate No</th><th class="py-3 px-3 text-left">Driver</th><th class="py-3 px-3 text-left">Hauler</th><th class="py-3 px-3 text-center">COTs</th><th class="py-3 px-3 text-right">Capacity (L)</th><th class="py-3 px-3 text-center">TPS</th></tr></thead><tbody id="truckBody"><tr><td colspan="7" class="text-center py-8 text-gray-500">Loading...</td></tr></tbody></table></div></div>
    </div>

    <script>
        const token=localStorage.getItem('fueltrak_token');const user=JSON.parse(localStorage.getItem('fueltrak_user')||'{}');
        if(!token)window.location.replace('/');
        document.getElementById('userInfo').textContent=user.email+' ('+user.role+')';
        
        async function loadTrucks(){
            var search=document.getElementById('searchInput').value.toLowerCase();
            var res=await fetch('/api/truck-masterlist-all',{headers:{'Authorization':'Bearer '+token}});
            var data=await res.json();
            if(data.status==='success'){
                var trucks=data.data;
                if(search) trucks=trucks.filter(function(t){return(t.plate_no||'').toLowerCase().indexOf(search)>=0||(t.driver_name||'').toLowerCase().indexOf(search)>=0||(t.hauler_name||'').toLowerCase().indexOf(search)>=0;});
                document.getElementById('truckBody').innerHTML=trucks.map(function(t){
                    var cots=[t.cot1,t.cot2,t.cot3,t.cot4,t.cot5,t.cot6,t.cot7,t.cot8,t.cot9,t.cot10].filter(function(v){return v>0;});
                    return'<tr class="border-b hover:bg-gray-50"><td class="py-2 px-3">'+(t.truck_make||'-')+'</td><td class="py-2 px-3 font-semibold">'+t.plate_no+'</td><td class="py-2 px-3">'+(t.driver_name||'-')+'</td><td class="py-2 px-3">'+(t.hauler_name||'-')+'</td><td class="py-2 px-3 text-center">'+cots.length+'</td><td class="py-2 px-3 text-right">'+(t.total_capacity||0).toLocaleString()+'</td><td class="py-2 px-3 text-center">'+(t.tps_count||0)+'</td></tr>';
                }).join('')||'<tr><td colspan="7" class="text-center py-8 text-gray-500">No trucks found</td></tr>';
            }
        }
        
        function logout(){localStorage.clear();window.location.href='/';}
        loadTrucks();
    </script>
</body>
</html>
